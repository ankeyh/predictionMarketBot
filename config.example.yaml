loop_seconds: 300

venue:
  name: hybrid
  min_edge: 0.10
  min_confidence: 0.70
  paper_overrides:
    crypto_spot:
      min_edge: 0.018
      min_confidence: 0.24
    crypto_price:
      min_edge: 0.03
      min_confidence: 0.25
    crypto_event:
      min_edge: 0.04
      min_confidence: 0.30
    sports:
      min_edge: 0.005
      min_confidence: 0.16
  markets:
    - id: btc-5m-up
      market_type: crypto_price
      question: Will BTC/USD be higher in 5 minutes?
      yes_price: 0.46
      no_price: 0.54
      reference_symbol: BTCUSD
      context:
        resolution_window_minutes: 5
        headline_summary: "BTC trades quietly after mixed macro headlines."
        price_source: "BTCUSD spot"
    - id: fed-cut-next-meeting
      market_type: fed_rates
      question: Will the Fed cut rates at the next FOMC meeting?
      yes_price: 0.31
      no_price: 0.69
      reference_symbol: FEDFUNDS
      context:
        meeting_date: "2026-05-06"
        implied_path_bps: -12
        headline_summary: "Inflation cooled slightly while labor data remains resilient."
    - id: pres-2028-dem-win
      market_type: election
      question: Will the Democratic nominee win the 2028 US presidential election?
      yes_price: 0.52
      no_price: 0.48
      reference_symbol: ELECTION
      context:
        election_date: "2028-11-07"
        headline_summary: "Early national polling remains noisy and event risk is high."
  kalshi_event_ticker: null
  kalshi_demo: true
  kalshi_base_url: https://demo-api.kalshi.co/trade-api/v2
  reference_symbol: BTCUSD
  discovery_source: coingecko
  discovery_limit: 25
  spot_horizon_hours: 2
  max_crypto_markets: 6
  max_sports_markets: 2
  spot_symbols:
    - BTCUSD
    - ETHUSD
    - SOLUSD
    - XRPUSD
  allowed_market_types:
    - crypto_spot
    - sports
  allowed_keywords:
    - bitcoin
    - ethereum
    - solana
    - xrp
  sports_keywords:
    - cricket
    - ipl
    - t20
    - odi
    - test match
    - winner
    - vs
  max_days_to_close: 30
  max_markets: 8
  max_markets_per_theme: 1
  min_contract_price: 0.05
  max_contract_price: 0.95

analysis:
  provider: candles
  anthropic_model: claude-sonnet-4-20250514
  macro_overlay:
    enabled: true
    cache_minutes: 20
    news_limit: 18

execution:
  enabled: true
  mode: paper
  max_order_notional: 25.0
  max_daily_notional: 150.0
  cooldown_minutes: 10
  stop_loss_cooldown_minutes: 90
  allow_repeat_market_orders: false
  adaptive_spot:
    enabled: true
    recent_window: 12
    min_blocked_to_relax: 4
    strong_blocked_to_relax: 8
    replay_wins_to_relax: 2
    replay_losses_to_tighten: 4
    losses_to_tighten: 2
    stop_losses_to_tighten: 2
  spot_guardrail:
    enabled: true
    min_momentum_score: 0.18
    min_change_1h_pct: 0.0002
    min_realized_vol_1h: 0.0004
    max_realized_vol_1h: 0.03
    require_drift_alignment: true
  paper_exit_rules:
    crypto_spot:
      take_profit_pct: 0.04
      stop_loss_pct: 0.025
      max_hold_minutes: 120
      exit_on_opposite_signal: true
      min_exit_confidence: 0.40
    crypto_price:
      take_profit_pct: 0.18
      stop_loss_pct: 0.10
      max_hold_minutes: 720
      exit_on_opposite_signal: true
      min_exit_confidence: 0.45

risk:
  starting_cash: 250.0
  max_open_positions: 6
  max_single_position_notional: 25.0
  daily_loss_limit: 30.0

telemetry:
  data_dir: data_spot
